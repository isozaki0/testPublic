name: Make repo private test

on:
  workflow_dispatch:
  schedule:
    - cron: "52 2 7 7 *"  # 2026-07-07 11:52 KST

jobs:
  make-private:
    runs-on: ubuntu-latest

    steps:
      - name: Make repository private
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          curl -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/isozaki0/eCommerceAutoOrder" \
            -d '{"private":true}'
